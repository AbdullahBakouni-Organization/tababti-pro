# ============================================================
# nginx-primary.conf — Production API Gateway Reverse Proxy
# Tababti Platform · Hardened for Security + High Performance
# ============================================================
#
# Deployment context:
#   Traefik (Dokploy) → nginx-primary:80 → api-gateway:3000
#                                         → minio:9000  (/storage/)
#
# SSL/TLS is fully handled by Traefik upstream.
# nginx-primary operates on HTTP only within the Docker network.
# ============================================================


# ── Worker Configuration ────────────────────────────────────────────────────────
# auto = one worker per logical CPU core (12 on this host).
worker_processes      auto;

# Raise the per-worker open-file limit well above worker_connections so that
# upstream sockets, log file handles, and temp files never hit the OS cap.
worker_rlimit_nofile  65535;

events {
  # Total simultaneous connections this instance handles:
  # worker_processes × worker_connections = 12 × 8192 = 98 304 max.
  worker_connections  8192;

  # Accept every pending connection in one epoll wake-up instead of one-at-a-time.
  multi_accept        on;

  # Linux best-practice I/O multiplexor — scales to tens of thousands of connections.
  use                 epoll;
}

http {
  # ── MIME Types ────────────────────────────────────────────────────────────────
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ── Core Security Hardening ───────────────────────────────────────────────────
  # Remove the "Server: nginx/x.y.z" header from every response.
  server_tokens off;

  # ── Real IP Resolution (behind Traefik / Docker NAT) ─────────────────────────
  # Traefik sits in the same Docker bridge network and injects X-Forwarded-For.
  # Without these directives, $remote_addr equals the Traefik container IP and
  # rate-limit zones hit the proxy instead of the real client.
  set_real_ip_from  10.0.0.0/8;       # Docker overlay / custom networks
  set_real_ip_from  172.16.0.0/12;    # Docker default bridge (172.17-31.x)
  set_real_ip_from  192.168.0.0/16;   # Compose bridge variants
  real_ip_header    X-Forwarded-For;
  # Strip any RFC-1918 addresses the client might have injected into the chain.
  real_ip_recursive on;

  # ── Dynamic DNS Resolution (Docker embedded DNS) ──────────────────────────────
  # Docker's embedded DNS runs at 127.0.0.11. Setting this resolver makes nginx
  # re-resolve upstream hostnames every 30 s instead of caching them at startup.
  # This is critical in Docker/Dokploy environments where container IPs change on
  # every redeployment — without it nginx keeps connecting to the old (dead) IP.
  resolver 127.0.0.11 valid=30s ipv6=off;
  resolver_timeout 5s;

  # ── Rate-Limiting Zones ───────────────────────────────────────────────────────
  # 20m shared memory → ~160 000 tracked IPs per zone.
  limit_req_zone  $binary_remote_addr  zone=api_limit:20m     rate=30r/s;
  limit_req_zone  $binary_remote_addr  zone=auth_limit:10m    rate=5r/s;
  limit_req_zone  $binary_remote_addr  zone=storage_limit:10m rate=20r/s;

  # ── Connection-Limiting Zone ──────────────────────────────────────────────────
  # Caps simultaneous open TCP connections per IP regardless of request rate.
  # Complements rate limiting against slow-loris and connection-exhaustion attacks.
  limit_conn_zone   $binary_remote_addr  zone=conn_per_ip:10m;
  limit_conn_status 429;

  # ── Structured Access Log ─────────────────────────────────────────────────────
  # Includes upstream timing variables for p99 latency analysis.
  log_format tababti_main
    '$remote_addr - [$time_local] "$request" $status $body_bytes_sent '
    'rt=$request_time uct="$upstream_connect_time" '
    'uht="$upstream_header_time" urt="$upstream_response_time" '
    'rid="$http_x_request_id" ref="$http_referer" ua="$http_user_agent"';

  access_log  /var/log/nginx/access.log  tababti_main  buffer=32k  flush=5s;
  error_log   /var/log/nginx/error.log   warn;

  # ── Performance — TCP / File I/O ─────────────────────────────────────────────
  sendfile                on;    # Zero-copy file transfer (kernel → socket)
  tcp_nopush              on;    # Batch full packets before flushing (with sendfile)
  tcp_nodelay             on;    # Flush small packets immediately on keepalive sockets
  reset_timedout_connection on;  # Send RST for timed-out connections → reclaim FDs fast

  # ── Keepalive (client ↔ nginx) ────────────────────────────────────────────────
  keepalive_timeout   30s;    # Close idle client connections after 30 s (was 65 s)
  keepalive_requests  1000;   # Recycle connection after 1 000 requests to prevent leaks

  # ── Client Request Limits ─────────────────────────────────────────────────────
  client_max_body_size        50m;   # Match the app-level multipart upload limit
  client_body_buffer_size     128k;  # Buffer body in RAM; spill to tmp only if larger
  client_header_buffer_size   4k;
  large_client_header_buffers 4 16k;
  client_body_timeout         30s;   # Drop clients that stall mid-upload
  client_header_timeout       10s;   # Drop clients that stall sending headers
  send_timeout                30s;   # Drop clients that stall receiving the response

  # ── Open-File Cache ───────────────────────────────────────────────────────────
  # Caches fd, file size, and last-modified for up to 1 000 entries.
  # Saves a stat() syscall per request when serving static content or log rotation.
  open_file_cache           max=1000 inactive=20s;
  open_file_cache_valid     30s;
  open_file_cache_min_uses  2;
  open_file_cache_errors    on;

  # ── Proxy Global Defaults ─────────────────────────────────────────────────────
  # Applied to every proxy_pass unless overridden at the location block level.
  proxy_http_version    1.1;
  proxy_connect_timeout 5s;    # Fail fast if the upstream is unreachable
  proxy_send_timeout    60s;
  proxy_read_timeout    60s;

  # Buffer upstream responses in nginx memory.
  # Prevents slow downstream clients from tying up upstream worker threads
  # (head-of-line blocking). Adjust proxy_buffers for your typical response size.
  proxy_buffering            on;
  proxy_buffer_size          8k;     # First-chunk buffer (headers + start of body)
  proxy_buffers             16 16k;  # 256 kB total per-request buffer pool
  proxy_busy_buffers_size   32k;
  proxy_temp_file_write_size 64k;

  # Strip headers that reveal internal infrastructure details.
  proxy_hide_header X-Powered-By;
  proxy_hide_header X-AspNet-Version;
  proxy_hide_header X-Runtime;

  # ── WebSocket Upgrade Map ─────────────────────────────────────────────────────
  # Sets Connection: upgrade only for genuine WebSocket handshakes;
  # otherwise sends Connection: "" which activates upstream keepalive.
  map $http_upgrade $connection_upgrade {
    default  upgrade;
    ''       '';
  }

  # ── Request-ID Passthrough ────────────────────────────────────────────────────
  # Honour an X-Request-ID injected by Traefik or the client SDK;
  # fall back to nginx's built-in $request_id (32-char hex UUID per request).
  map $http_x_request_id $req_id {
    default  $request_id;
    ~.+      $http_x_request_id;
  }

  # ── Gzip Compression ─────────────────────────────────────────────────────────
  gzip              on;
  gzip_vary         on;       # Vary: Accept-Encoding — required for CDN correctness
  gzip_proxied      any;      # Compress responses coming from upstream servers
  gzip_comp_level   5;        # Level 5: ~80 % of max ratio at ~40 % of max CPU cost
  gzip_min_length   256;      # Skip compression for responses smaller than 256 bytes
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml
    application/xml+rss
    application/atom+xml
    application/x-javascript
    image/svg+xml
    font/truetype
    font/opentype
    application/vnd.ms-fontobject;

  # ── Upstream Variables (dynamic DNS resolution) ──────────────────────────────
  # Using variables with proxy_pass forces nginx to resolve hostnames via the
  # resolver above on every request (honouring the 30 s TTL), instead of
  # resolving once at startup and caching forever.
  #
  # Trade-off: upstream keepalive is not available when proxy_pass uses a
  # variable, but correct routing after container restarts is more important
  # in a Docker/Dokploy environment where container IPs change on redeploy.
  #
  # Keepalive at the TCP level (keepalive_timeout, keepalive_requests) between
  # nginx and downstream clients is unaffected.
  map $host $api_gateway {
    default "http://api-gateway:3000";
  }

  map $host $minio_backend {
    default "http://minio:9000";
  }


  # ============================================================
  # Virtual Server
  # ============================================================
  server {
    listen       80;
    server_name  _;    # Catch-all; Traefik already enforces the hostname

    # ── Global Security Headers ──────────────────────────────────────────────
    # Every response from this server carries the full security header set.

    # Prevent clickjacking. DENY is correct for a pure-API server with no UI.
    add_header X-Frame-Options            "DENY"                                     always;

    # Prevent MIME-type sniffing exploits.
    add_header X-Content-Type-Options     "nosniff"                                  always;

    # Reduce Referer data leakage across origins.
    add_header Referrer-Policy            "strict-origin-when-cross-origin"          always;

    # Restrict browser feature access.
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=(), payment=()" always;

    # HTTP Strict Transport Security — forces browsers to use HTTPS for 1 year.
    # Traefik terminates TLS and passes this header through to the browser.
    # 'preload' allows submission to browser HSTS preload lists.
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;

    # Content Security Policy — restrictive for a pure REST API.
    # 'frame-ancestors none' supersedes X-Frame-Options in modern browsers.
    add_header Content-Security-Policy    "default-src 'none'; frame-ancestors 'none'" always;

    # Propagate the unique request ID downstream so logs across all services
    # can be correlated by a single trace token.
    add_header X-Request-ID               $req_id                                    always;

    # Limit simultaneous TCP connections per client IP across all locations.
    # Protects against connection-exhaustion / slow-loris attacks.
    limit_conn conn_per_ip 100;

    # ── Auth Endpoints — Strict Rate Limit ──────────────────────────────────
    # Tighter limits than the general API zone to slow credential-stuffing
    # and brute-force attacks without impacting normal API traffic.
    location ~ ^/api/v1/(auth|admin/sign-in) {
      limit_req         zone=auth_limit burst=10 nodelay;
      limit_req_status  429;
      limit_req_log_level warn;

      proxy_pass            $api_gateway;
      proxy_http_version    1.1;
      proxy_set_header      Upgrade           $http_upgrade;
      proxy_set_header      Connection        $connection_upgrade;
      proxy_set_header      Host              $host;
      proxy_set_header      X-Real-IP         $remote_addr;
      proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header      X-Forwarded-Proto $scheme;
      proxy_set_header      X-Request-ID      $req_id;

      # Strip any auth-related request headers the client should not inject.
      proxy_set_header      X-Internal-User   "";
      proxy_set_header      X-Admin-Override  "";
    }

    # ── MinIO Object Storage ─────────────────────────────────────────────────
    location /storage/ {
      limit_req         zone=storage_limit burst=30 nodelay;
      limit_req_status  429;

      rewrite          ^/storage/(.*) /$1 break;
      proxy_pass       $minio_backend;
      proxy_http_version 1.1;
      # Empty Connection header activates upstream keepalive.
      proxy_set_header Connection "";
      proxy_set_header Host      $host;
      proxy_set_header X-Real-IP $remote_addr;

      # Buffer storage responses; most objects fit comfortably.
      proxy_buffering    on;
      proxy_buffer_size  8k;
      proxy_buffers      8 16k;

      # Strip AWS-compatible headers that expose internal MinIO details.
      proxy_hide_header x-amz-request-id;
      proxy_hide_header x-amz-id-2;
      proxy_hide_header x-minio-deployment-id;
      proxy_hide_header x-minio-origin-endpoint;
    }

    # ── Health Check ─────────────────────────────────────────────────────────
    # Exact-match prefix is faster than a regex; no rate limit, no access log.
    location = /health {
      access_log  off;
      proxy_pass  $api_gateway;
      proxy_http_version 1.1;
      # Empty Connection activates keepalive to gateway.
      proxy_set_header Connection "";
      proxy_set_header Host      $host;
    }

    # ── General API Traffic ──────────────────────────────────────────────────
    # Catch-all for /home/*, /booking/*, /social/*, /notification/*, etc.
    location / {
      limit_req         zone=api_limit burst=60 nodelay;
      limit_req_status  429;
      limit_req_log_level warn;

      proxy_pass            $api_gateway;
      proxy_http_version    1.1;
      proxy_set_header      Upgrade           $http_upgrade;
      proxy_set_header      Connection        $connection_upgrade;
      proxy_set_header      Host              $host;
      proxy_set_header      X-Real-IP         $remote_addr;
      proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header      X-Forwarded-Proto $scheme;
      proxy_set_header      X-Request-ID      $req_id;

      # Strip any privileged headers that must not be injected from outside.
      proxy_set_header      X-Internal-User   "";
      proxy_set_header      X-Admin-Override  "";
    }
  }
}
