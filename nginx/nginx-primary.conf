worker_processes auto;

events {
  worker_connections 4096;
}

http {
  client_max_body_size 50M;

  # ── Rate limiting zones ────────────────────────────────────────────────────
  # General API: 30 req/s per IP
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
  # Auth endpoints: 5 req/s per IP (stricter)
  limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

  # ── Logging ────────────────────────────────────────────────────────────────
  access_log /var/log/nginx/access.log;
  error_log  /var/log/nginx/error.log warn;

  # ── Performance ────────────────────────────────────────────────────────────
  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  gzip            on;
  gzip_types      text/plain application/json application/javascript text/css;

  # ── Hide nginx version from error pages ───────────────────────────────────
  server_tokens off;

  upstream api_gateway {
    server api-gateway:3000;
    keepalive 32;
  }

  server {
    listen 80;
    # Dokploy/Traefik handles SSL termination — nginx only needs HTTP internally.
    # Replace _ with your domain if you want strict host matching.
    server_name _;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"                         always;
    add_header X-Content-Type-Options "nosniff"                            always;
    add_header X-XSS-Protection       "1; mode=block"                      always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"    always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;
    # Uncomment once Dokploy/Traefik is confirmed handling HTTPS:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Auth endpoints — strict rate limit ───────────────────────────────────
    location ~ ^/api/v1/(auth|admin/sign-in) {
      limit_req        zone=auth_limit burst=10 nodelay;
      limit_req_status 429;

      proxy_pass            http://api_gateway;
      proxy_http_version    1.1;
      proxy_set_header      Upgrade           $http_upgrade;
      proxy_set_header      Connection        "upgrade";
      proxy_set_header      Host              $host;
      proxy_set_header      X-Real-IP         $remote_addr;
      proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header      X-Forwarded-Proto $scheme;
      proxy_buffering       off;
      proxy_connect_timeout 10s;
      proxy_send_timeout    60s;
      proxy_read_timeout    60s;
    }

    # ── MinIO file storage ────────────────────────────────────────────────────
    location /storage/ {
      rewrite          ^/storage/(.*) /$1 break;
      proxy_pass       http://minio:9000;
      proxy_http_version 1.1;
      proxy_set_header Host      $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_buffering  off;
      proxy_cache      off;
    }

    # ── Health check — no rate limit, no logs ────────────────────────────────
    location /health {
      access_log         off;
      proxy_pass         http://api_gateway;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
    }

    # ── All other API traffic ─────────────────────────────────────────────────
    location / {
      limit_req        zone=api_limit burst=60 nodelay;
      limit_req_status 429;

      proxy_pass            http://api_gateway;
      proxy_http_version    1.1;
      proxy_set_header      Upgrade           $http_upgrade;
      proxy_set_header      Connection        "upgrade";
      proxy_set_header      Host              $host;
      proxy_set_header      X-Real-IP         $remote_addr;
      proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header      X-Forwarded-Proto $scheme;
      proxy_buffering       off;
      proxy_connect_timeout 10s;
      proxy_send_timeout    60s;
      proxy_read_timeout    60s;
    }
  }
}
