worker_processes auto;

events {
  worker_connections 4096;
}

http {
  # Docker's embedded DNS — resolves container names at runtime
  resolver 127.0.0.11 valid=10s ipv6=off;
  resolver_timeout 5s;

  client_max_body_size 50M;

  access_log /var/log/nginx/access.log;
  error_log  /var/log/nginx/error.log warn;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  gzip            on;
  gzip_types      text/plain application/json application/javascript text/css;

  # ── 50/50 load balance between instances ──────────────────────────────────
  split_clients "$remote_addr$uri" $home_backend {
    50% home-service-1;
    *   home-service-2;
  }

  split_clients "$remote_addr$uri" $social_backend {
    50% social-service-1;
    *   social-service-2;
  }

  server {
    listen 8080;

    # ── HOME SERVICE ──────────────────────────────────────────────────────────
    # /home/doctors/search → home-service:3001/api/v1/doctors/search
    location /home/ {
      rewrite            ^/home/(.*) /api/v1/$1 break;
      proxy_pass         http://$home_backend:3001;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_buffering    off;
      proxy_connect_timeout 10s;
      proxy_send_timeout    60s;
      proxy_read_timeout    60s;
    }

    # ── SOCIAL SERVICE ────────────────────────────────────────────────────────
    # /social/xyz → social-service:3002/api/v1/xyz
    location /social/ {
      rewrite            ^/social/(.*) /api/v1/$1 break;
      proxy_pass         http://$social_backend:3002;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_buffering    off;
      proxy_connect_timeout 10s;
      proxy_send_timeout    60s;
      proxy_read_timeout    60s;
    }

    # ── BOOKING SERVICE ───────────────────────────────────────────────────────
    # /booking/xyz → booking-service:3003/api/v1/xyz
    location /booking/ {
      set $booking_upstream booking-service;
      rewrite            ^/booking/(.*) /api/v1/$1 break;
      proxy_pass         http://$booking_upstream:3003;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_buffering    off;
      proxy_connect_timeout 10s;
      proxy_send_timeout    60s;
      proxy_read_timeout    60s;
    }

    # ── NOTIFICATION SERVICE ──────────────────────────────────────────────────
    # /notification/xyz → notification-service:3006/api/v1/xyz
    location /notification/ {
      set $notification_upstream notification-service;
      rewrite            ^/notification/(.*) /api/v1/$1 break;
      proxy_pass         http://$notification_upstream:3006;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_buffering    off;
      proxy_connect_timeout 10s;
      proxy_send_timeout    60s;
      proxy_read_timeout    60s;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location /health {
      access_log  off;
      return      200 "ok\n";
      add_header  Content-Type text/plain;
    }
  }
}
