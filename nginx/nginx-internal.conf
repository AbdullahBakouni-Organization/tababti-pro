worker_processes auto;

events {
  worker_connections 4096;
}

http {
  # ----------------------------
  # Logging
  # ----------------------------
  access_log /var/log/nginx/access.log;
  error_log  /var/log/nginx/error.log warn;

  # ----------------------------
  # Performance
  # ----------------------------
  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain application/json application/javascript text/css;

  # ----------------------------
  # Upstream Services
  # ----------------------------
  upstream home_service {
    least_conn;
    server home-service-1:3001;
    server home-service-2:3001;
  }

  upstream social_service {
    least_conn;
    server social-service-1:3002;
    server social-service-2:3002;
  }

  upstream booking_service {
    least_conn;
    server booking-service:3003;
  }

  upstream notification_service {
    least_conn;
    server notification-service:3006;
  }

  # ----------------------------
  # Server — listens on 8080 (internal only)
  # ----------------------------
  server {
    listen 8080;

    # ----------------------------
    # HOME SERVICE
    # ----------------------------
    location /home/ {
      proxy_pass         http://home_service/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      # FIX: was missing X-Forwarded-Proto
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cookie_path  / "/; HttpOnly; Secure; SameSite=Lax";
      proxy_buffering    off;
      # Timeouts
      proxy_connect_timeout 10s;
      proxy_send_timeout    60s;
      proxy_read_timeout    60s;
    }

    # ----------------------------
    # SOCIAL SERVICE
    # ----------------------------
    location /social/ {
      proxy_pass         http://social_service/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cookie_path  / "/; HttpOnly; Secure; SameSite=Lax";
      proxy_buffering    off;
      proxy_connect_timeout 10s;
      proxy_send_timeout    60s;
      proxy_read_timeout    60s;
    }

    # ----------------------------
    # BOOKING SERVICE
    # ----------------------------
    location /booking/ {
      proxy_pass         http://booking_service/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      # FIX: was missing X-Forwarded-For and X-Forwarded-Proto
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cookie_path  / "/; HttpOnly; Secure; SameSite=Lax";
      # FIX: was missing proxy_buffering off
      proxy_buffering    off;
      proxy_connect_timeout 10s;
      proxy_send_timeout    60s;
      proxy_read_timeout    60s;
    }

    # ----------------------------
    # NOTIFICATION SERVICE
    # ----------------------------
    location /notification/ {
      proxy_pass         http://notification_service/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      # FIX: was missing X-Forwarded-For and X-Forwarded-Proto
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cookie_path  / "/; HttpOnly; Secure; SameSite=Lax";
      # FIX: was missing proxy_buffering off
      proxy_buffering    off;
      proxy_connect_timeout 10s;
      proxy_send_timeout    60s;
      proxy_read_timeout    60s;
    }

    # ----------------------------
    # Health check endpoint
    # ----------------------------
    location /health {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }
  }
}
