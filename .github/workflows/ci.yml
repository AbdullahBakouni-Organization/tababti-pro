name: CI

on:
  push:
    branches: [develop, prod-test-pipline, update-cicd, update-structure]
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, closed]

# Concurrency: include event_name so PR/push runs don't collide or share groups.
concurrency:
  group: ci-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  # Pin exact LTS patch for deterministic builds.
  NODE_VERSION: '20.18.1'
  REGISTRY: docker.io
  IMAGE_PREFIX: ${{ secrets.DOCKER_USERNAME }}/tababti
  # Shared guard expression — referenced via `needs.gate.outputs.should_run`.

# ── When each stage runs ────────────────────────────────────────────────────────
#
#  Event                      │ Full CI  │ Push Images │ Deploy (Dokploy)
#  ───────────────────────────┼──────────┼─────────────┼─────────────────
#  PR → main (open/update)    │   YES    │     YES     │      NO
#  PR → main (merged)         │   NO     │      NO     │      YES  ← same run
#  Push → develop / other     │   YES    │      NO     │      NO
#
# ───────────────────────────────────────────────────────────────────────────────

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # GATE — single place that computes "should CI run?"
  # Downstream jobs depend on gate.outputs.should_run to remove the
  # duplicated `if:` expression previously repeated across every job.
  # ──────────────────────────────────────────────────────────────────────────
  gate:
    name: CI Gate
    runs-on: ubuntu-latest
    if: always()
    outputs:
      should_run: ${{ steps.compute.outputs.should_run }}
    steps:
      - id: compute
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.event.action }}" != "closed" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  # ──────────────────────────────────────────────────────────────────────────
  # STAGE 1 — Install & Cache
  # ──────────────────────────────────────────────────────────────────────────
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-${{ env.NODE_VERSION }}-
            node-modules-${{ runner.os }}-

  # ──────────────────────────────────────────────────────────────────────────
  # STAGE 2 — Type Check
  # ──────────────────────────────────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: [gate, install]
    if: needs.gate.outputs.should_run == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-${{ env.NODE_VERSION }}-
            node-modules-${{ runner.os }}-

      - name: Install dependencies (cache miss fallback)
        run: |
          if [ ! -d node_modules ]; then
            echo "Cache miss — running npm ci"
            npm ci --prefer-offline
          fi

      - name: Run TypeScript type check
        run: npx tsc --noEmit -p tsconfig.json

  # ──────────────────────────────────────────────────────────────────────────
  # STAGE 3 — Lint
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [gate, install]
    if: needs.gate.outputs.should_run == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-${{ env.NODE_VERSION }}-
            node-modules-${{ runner.os }}-

      - name: Install dependencies (cache miss fallback)
        run: |
          if [ ! -d node_modules ]; then
            echo "Cache miss — running npm ci"
            npm ci --prefer-offline
          fi

      - name: Run ESLint
        run: npx eslint "{apps,libs}/**/*.ts" --max-warnings 0

  # ──────────────────────────────────────────────────────────────────────────
  # STAGE 4 — Unit Tests + Coverage (thresholds enforced via jest config)
  # ──────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [gate, install]
    if: needs.gate.outputs.should_run == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-${{ env.NODE_VERSION }}-
            node-modules-${{ runner.os }}-

      - name: Install dependencies (cache miss fallback)
        run: |
          if [ ! -d node_modules ]; then
            echo "Cache miss — running npm ci"
            npm ci --prefer-offline
          fi

      - name: Run unit tests with coverage
        run: npm run test:cov -- --ci --forceExit --passWithNoTests
        env:
          NODE_ENV: test
          FIREBASE_PROJECT_ID: test-project
          FIREBASE_CLIENT_EMAIL: test@test-project.iam.gserviceaccount.com
          FIREBASE_PRIVATE_KEY: '-----BEGIN RSA PRIVATE KEY-----\nMIIEpAIBAAKCAQEA0Z3VS5JJcds3xHn/ygWep4OF7+E=\n-----END RSA PRIVATE KEY-----'

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Coverage summary comment (PRs only)
        if: github.event_name == 'pull_request' && github.event.action != 'closed'
        uses: davelosert/vitest-coverage-report-action@v2
        continue-on-error: true
        with:
          json-summary-path: coverage/coverage-summary.json

  # ──────────────────────────────────────────────────────────────────────────
  # STAGE 5 — Integration Tests
  # (previous `check-integration` probe job removed — test files always exist.)
  # ──────────────────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [gate, unit-tests]
    if: needs.gate.outputs.should_run == 'true'
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-${{ env.NODE_VERSION }}-
            node-modules-${{ runner.os }}-

      - name: Install dependencies (cache miss fallback)
        run: |
          if [ ! -d node_modules ]; then
            echo "Cache miss — running npm ci"
            npm ci --prefer-offline
          fi

      - name: Start MongoDB replica set
        run: |
          docker run -d \
            --name mongo-rs \
            -p 27017:27017 \
            mongo:7 \
            mongod --replSet rs0 --bind_ip_all

          echo "Waiting for mongod to start..."
          timeout 60 bash -c \
            "until docker exec mongo-rs mongosh --quiet --eval 'db.adminCommand(\"ping\")' &>/dev/null; do sleep 2; done"

          docker exec mongo-rs mongosh --quiet --eval \
            "rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: '127.0.0.1:27017' }] })"

          timeout 60 bash -c \
            "until docker exec mongo-rs mongosh --quiet --eval 'rs.isMaster().ismaster' 2>/dev/null | grep -q 'true'; do sleep 2; done"
          echo "MongoDB replica set ready."

      - name: Run integration tests
        run: npm run test:integration
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://127.0.0.1:27017/?replicaSet=rs0&directConnection=true
          REDIS_HOST: localhost
          REDIS_PORT: '6379'

  # ──────────────────────────────────────────────────────────────────────────
  # STAGE 6 — Build
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [gate, typecheck, lint, unit-tests]
    if: needs.gate.outputs.should_run == 'true'
    strategy:
      matrix:
        service:
          - api-gateway
          - home-service
          - social-service
          - booking-service
          - notification-service
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-${{ env.NODE_VERSION }}-
            node-modules-${{ runner.os }}-

      - name: Install dependencies (cache miss fallback)
        run: |
          if [ ! -d node_modules ]; then
            echo "Cache miss — running npm ci"
            npm ci --prefer-offline
          fi

      - name: Build ${{ matrix.service }}
        run: npm run build:${{ matrix.service }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.service }}
          path: dist/apps/${{ matrix.service }}/
          retention-days: 1

  # ──────────────────────────────────────────────────────────────────────────
  # STAGE 7 — Docker Build (build only — no push)
  # ──────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [gate, build]
    if: needs.gate.outputs.should_run == 'true'
    strategy:
      matrix:
        service:
          - api-gateway
          - home-service
          - social-service
          - booking-service
          - notification-service
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ matrix.service }}
          path: dist/apps/${{ matrix.service }}/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (cache only — no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/${{ matrix.service }}.Dockerfile
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:ci-build
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SERVICE=${{ matrix.service }}

  # ──────────────────────────────────────────────────────────────────────────
  # STAGE 7b — Docker Compose Test
  # CI-only secrets sourced from repo vars/secrets with safe fallbacks.
  # ──────────────────────────────────────────────────────────────────────────
  docker-compose-test:
    name: Docker Compose Test
    runs-on: ubuntu-latest
    needs: [gate, docker-build]
    if: needs.gate.outputs.should_run == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Create CI .env
        env:
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          # CI-only test credentials — sourced from repo vars (falls back to
          # non-production defaults so CI still runs if vars are unset).
          CI_REDIS_PASSWORD: ${{ vars.CI_REDIS_PASSWORD || 'ci-test-password' }}
          CI_MINIO_ROOT_USER: ${{ vars.CI_MINIO_ROOT_USER || 'minioadmin' }}
          CI_MINIO_ROOT_PASSWORD: ${{ vars.CI_MINIO_ROOT_PASSWORD || 'minioadmin123' }}
          CI_MINIO_ACCESS_KEY: ${{ vars.CI_MINIO_ACCESS_KEY || 'minioadmin' }}
          CI_MINIO_SECRET_KEY: ${{ vars.CI_MINIO_SECRET_KEY || 'minioadmin123' }}
          CI_KAFKA_UI_USER: ${{ vars.CI_KAFKA_UI_USER || 'admin' }}
          CI_KAFKA_UI_PASSWORD: ${{ vars.CI_KAFKA_UI_PASSWORD || 'admin123' }}
        run: |
          python3 - <<'PY'
          import os
          env = os.environ
          lines = [
            "DOCKER_USERNAME=abdullahbakouni",
            "IMAGE_TAG=ci-test",
            f"REDIS_PASSWORD={env['CI_REDIS_PASSWORD']}",
            "MONGO_URI=mongodb://mongo:27017/?replicaSet=rs0&directConnection=true",
            "MONGO_DB=tababti_ci",
            "KAFKA_CLUSTER_ID=wdLj9KW2eJASNKvN71Z4kA",
            f"MINIO_ROOT_USER={env['CI_MINIO_ROOT_USER']}",
            f"MINIO_ROOT_PASSWORD={env['CI_MINIO_ROOT_PASSWORD']}",
            f"MINIO_ACCESS_KEY={env['CI_MINIO_ACCESS_KEY']}",
            f"MINIO_SECRET_KEY={env['CI_MINIO_SECRET_KEY']}",
            "MINIO_BUCKET_DOCTORS=tababti-doctors",
            "MINIO_BUCKET_PATIENTS=tababti-patients",
            "MINIO_BUCKET_GENERAL=tababti-general",
            "MINIO_PUBLIC_URL_DEV=http://minio:9000",
            f"KAFKA_UI_USER={env['CI_KAFKA_UI_USER']}",
            f"KAFKA_UI_PASSWORD={env['CI_KAFKA_UI_PASSWORD']}",
            "JWT_ACCESS_EXPIRES_IN=15m",
            "JWT_REFRESH_EXPIRES_IN=7d",
            "ALLOWED_ORIGINS=http://localhost:3000",
            "FLASK_API_URL=https://Abood-40-transliteration-api.hf.space",
            "OPENROUTE_API_KEY=ci-dummy-key",
            "MINIO_API_PORT=9000",
            "MINIO_CONSOLE_PORT=9001",
            "KAFKA_UI_PORT=8090",
          ]
          for key in ("JWT_ACCESS_SECRET", "JWT_REFRESH_SECRET",
                      "FIREBASE_PROJECT_ID", "FIREBASE_CLIENT_EMAIL",
                      "FIREBASE_PRIVATE_KEY"):
            val = env.get(key, "")
            lines.append(f"{key}={val}")
          with open(".env", "w") as f:
            f.write("\n".join(lines) + "\n")
          print("CI .env written.")
          PY

      - name: Validate compose config
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml config --quiet

      - name: Build images
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml build --parallel
        timeout-minutes: 25

      - name: Start stack
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --no-build
        env:
          COMPOSE_HTTP_TIMEOUT: 300

      - name: Wait — infrastructure healthy
        run: |
          wait_healthy() {
            local cname="$1" timeout="${2:-180}"
            echo ":: Waiting for $cname ..."
            timeout "$timeout" bash -c \
              "until [ \"\$(docker inspect --format='{{.State.Health.Status}}' $cname 2>/dev/null)\" = 'healthy' ]; do sleep 5; done" \
            || { echo "TIMEOUT: $cname never became healthy"; docker logs "$cname" --tail 40; return 1; }
            echo "   $cname is healthy."
          }
          wait_healthy tababti-mongo-ci  180
          wait_healthy tababti-redis     120
          wait_healthy tababti-kafka     300
          wait_healthy tababti-minio     120
          echo ":: Waiting for kafka-init to complete ..."
          timeout 180 bash -c \
            "until docker inspect --format='{{.State.ExitCode}}' tababti-kafka-init 2>/dev/null | grep -q '^0$'; do sleep 5; done" \
          || { echo "TIMEOUT: kafka-init did not complete"; docker logs tababti-kafka-init --tail 40; exit 1; }
          echo "   kafka-init done."
        timeout-minutes: 10

      - name: Wait — app services healthy
        run: |
          wait_healthy() {
            local cname="$1" timeout="${2:-300}"
            echo ":: Waiting for $cname ..."
            timeout "$timeout" bash -c \
              "until [ \"\$(docker inspect --format='{{.State.Health.Status}}' $cname 2>/dev/null)\" = 'healthy' ]; do sleep 10; done" \
            || { echo "FAIL: $cname did not become healthy"; docker logs "$cname" --tail 50; return 1; }
            echo "   $cname is healthy."
          }
          failed=0
          wait_healthy tababti-home-service-1        || failed=1
          wait_healthy tababti-home-service-2        || failed=1
          wait_healthy tababti-social-service-1      || failed=1
          wait_healthy tababti-social-service-2      || failed=1
          wait_healthy tababti-notification-service  || failed=1
          wait_healthy tababti-booking-service       || failed=1
          wait_healthy tababti-api-gateway           || failed=1
          wait_healthy tababti-nginx-primary         || failed=1
          exit $failed
        timeout-minutes: 12

      - name: Compose status
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml ps --all

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --tail 80

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v --remove-orphans

  # ──────────────────────────────────────────────────────────────────────────
  # STAGE 8 — Security Scan
  # ──────────────────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [gate, install]
    if: needs.gate.outputs.should_run == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-${{ env.NODE_VERSION }}-
            node-modules-${{ runner.os }}-

      - name: Install dependencies (cache miss fallback)
        run: |
          if [ ! -d node_modules ]; then
            echo "Cache miss — running npm ci"
            npm ci --prefer-offline
          fi

      - name: Dependency vulnerability audit
        run: npm audit --audit-level=high
        # Kept non-blocking for now: existing prod deps may have HIGH advisories
        # that block all CI if enforced strictly. Remove once triaged.
        continue-on-error: true

      - name: Secret detection (verified secrets block the build)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

      - name: Container image scan (Trivy)
        if: github.event_name == 'pull_request' && github.base_ref == 'main' && github.event.action != 'closed'
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
        continue-on-error: true

      - name: Upload Trivy scan results
        if: github.event_name == 'pull_request' && github.base_ref == 'main' && github.event.action != 'closed'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────────────────
  # STAGE 8b — CodeQL Static Analysis (JavaScript/TypeScript)
  # ──────────────────────────────────────────────────────────────────────────
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────────────────
  # STAGE 9 — Push Images
  # ──────────────────────────────────────────────────────────────────────────
  push-image:
    name: Push Image (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [docker-compose-test, security-scan]
    if: github.event_name == 'pull_request' && github.base_ref == 'main' && github.event.action != 'closed'
    strategy:
      matrix:
        service:
          - api-gateway
          - home-service
          - social-service
          - booking-service
          - notification-service
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ matrix.service }}
          path: dist/apps/${{ matrix.service }}/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push (from GHA layer cache)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/${{ matrix.service }}.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SERVICE=${{ matrix.service }}

  # ──────────────────────────────────────────────────────────────────────────
  # GATE — CI Complete
  # ──────────────────────────────────────────────────────────────────────────
  ci-complete:
    name: CI Complete
    runs-on: ubuntu-latest
    if: always()
    needs:
      - gate
      - install
      - typecheck
      - lint
      - unit-tests
      - integration-tests
      - build
      - docker-build
      - docker-compose-test
      - security-scan
      - codeql
      - push-image
    steps:
      - name: Check all required jobs passed
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail
          failed=$(echo "$NEEDS_JSON" | jq -r 'to_entries | map(select(.value.result != "success" and .value.result != "skipped") | .key) | .[]')
          if [ -n "$failed" ]; then
            echo "FAILED jobs:"
            echo "$failed"
            exit 1
          fi
          echo "All required jobs passed or were skipped."

      - name: Trigger Dokploy deployment
        if: github.event.pull_request.merged == true && github.base_ref == 'main'
        run: |
          set -euo pipefail
          echo "Triggering Dokploy compose deployment for commit ${{ github.sha }}..."
          http=$(curl -s -o /tmp/dokploy_response.json -w "%{http_code}" \
            -X POST "${{ secrets.DOKPLOY_URL }}/api/compose.deploy" \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${{ secrets.DOKPLOY_TOKEN }}" \
            -d "{\"composeId\": \"${{ secrets.DOKPLOY_COMPOSE_ID }}\"}")
          echo "HTTP status: $http"
          body=$(cat /tmp/dokploy_response.json || echo '')
          echo "Response body: $body"
          if [ "$http" != "200" ]; then
            echo "Dokploy deploy failed with HTTP status $http"
            exit 1
          fi
          # Best-effort body inspection: if JSON and has `success:false` or `error`, fail.
          if echo "$body" | jq -e 'type == "object" and ((.success == false) or (.error != null))' >/dev/null 2>&1; then
            echo "Dokploy returned HTTP 200 but response body indicates failure."
            exit 1
          fi
          echo "Deployment triggered successfully."
