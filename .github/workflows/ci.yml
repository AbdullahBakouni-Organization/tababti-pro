name: CI

on:
  push:
    branches: [main, develop, prod-test-pipline]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  REGISTRY: docker.io
  IMAGE_PREFIX: ${{ secrets.DOCKER_USERNAME }}/tababti

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # STAGE 1 — Install & Cache
  # ──────────────────────────────────────────────────────────────────────────
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

  # ──────────────────────────────────────────────────────────────────────────
  # STAGE 2 — Type Check
  # ──────────────────────────────────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run TypeScript type check
        run: npx tsc --noEmit -p tsconfig.json

  # ──────────────────────────────────────────────────────────────────────────
  # STAGE 3 — Lint
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run ESLint
        run: npx eslint "{apps,libs}/**/*.ts" --max-warnings 0

  # ──────────────────────────────────────────────────────────────────────────
  # STAGE 4 — Unit Tests + Coverage
  # ──────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run unit tests with coverage
        run: npm run test:cov -- --ci --forceExit --passWithNoTests
        env:
          NODE_ENV: test
          FIREBASE_PROJECT_ID: test-project
          FIREBASE_CLIENT_EMAIL: test@test-project.iam.gserviceaccount.com
          FIREBASE_PRIVATE_KEY: '-----BEGIN RSA PRIVATE KEY-----\nMIIEpAIBAAKCAQEA0Z3VS5JJcds3xHn/ygWep4OF7+E=\n-----END RSA PRIVATE KEY-----'

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Coverage summary comment (PRs only)
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        continue-on-error: true
        with:
          json-summary-path: coverage/coverage-summary.json

  # ──────────────────────────────────────────────────────────────────────────
  # STAGE 4b — Check whether integration tests exist (sets output for stage 5)
  # ──────────────────────────────────────────────────────────────────────────
  check-integration:
    name: Check Integration Tests Exist
    runs-on: ubuntu-latest
    needs: unit-tests
    outputs:
      has_tests: ${{ steps.check.outputs.has_tests }}
    steps:
      - uses: actions/checkout@v4

      - name: Check for integration test files
        id: check
        run: |
          if find tests/integration -name "*.spec.ts" -type f 2>/dev/null | grep -q .; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
            echo "Integration test files found."
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "No integration test files found — stage 5 will be skipped."
          fi

  # ──────────────────────────────────────────────────────────────────────────
  # STAGE 5 — Integration Tests (skipped when no files present)
  # ──────────────────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: check-integration
    if: needs.check-integration.outputs.has_tests == 'true'
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run integration tests
        run: npx jest --testPathPattern="tests/integration" --forceExit
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://localhost:27017
          REDIS_HOST: localhost
          REDIS_PORT: '6379'

  # ──────────────────────────────────────────────────────────────────────────
  # STAGE 6 — Build
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint, unit-tests]
    strategy:
      matrix:
        service:
          - api-gateway
          - home-service
          - social-service
          - booking-service
          - notification-service
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Build ${{ matrix.service }}
        run: npm run build:${{ matrix.service }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.service }}
          path: dist/apps/${{ matrix.service }}/
          retention-days: 1

  # ──────────────────────────────────────────────────────────────────────────
  # STAGE 7 — Docker Build
  # ──────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        service:
          - api-gateway
          - home-service
          - social-service
          - booking-service
          - notification-service
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ matrix.service }}
          path: dist/apps/${{ matrix.service }}/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/${{ matrix.service }}.Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SERVICE=${{ matrix.service }}

  # ──────────────────────────────────────────────────────────────────────────
  # STAGE 8 — Security Scan
  # ──────────────────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Dependency vulnerability audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Secret detection
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
        continue-on-error: true

      - name: Container image scan (Trivy)
        if: github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
        continue-on-error: true

      - name: Upload Trivy scan results
        if: github.ref == 'refs/heads/main'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────────────────
  # STAGE 9 — Push Image (main branch only)
  # ──────────────────────────────────────────────────────────────────────────
  push-image:
    name: Push Images
    runs-on: ubuntu-latest
    needs: [docker-build, security-scan]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Images pushed successfully
        run: echo "All Docker images pushed to ${{ env.REGISTRY }} by docker-build job."

  # ──────────────────────────────────────────────────────────────────────────
  # STAGE 10 — Deployment Trigger (main branch only)
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deployment Trigger
    runs-on: ubuntu-latest
    needs: push-image
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Trigger Dokploy deployment
        run: |
          echo "Triggering Dokploy compose deployment for commit ${{ github.sha }}..."
          response=$(curl -s -o /tmp/dokploy_response.json -w "%{http_code}" \
            -X POST "${{ secrets.DOKPLOY_URL }}/api/compose.deploy" \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${{ secrets.DOKPLOY_TOKEN }}" \
            -d "{\"composeId\": \"${{ secrets.DOKPLOY_COMPOSE_ID }}\"}")
          echo "HTTP status: $response"
          cat /tmp/dokploy_response.json
          if [ "$response" != "200" ]; then
            echo "Dokploy deploy failed with status $response"
            exit 1
          fi
          echo "Deployment triggered successfully."
