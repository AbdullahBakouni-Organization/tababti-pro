name: Setup Branch Protection

# Run this workflow once (manually) after the first successful CI run on main.
# It configures GitHub branch protection on `main` so that:
#   - Direct pushes are blocked — all changes must go through a PR.
#   - The PR can only be merged after "CI Complete" and "PR Guard" pass.
#   - Force-pushes are blocked.
#
# Requirements:
#   - The GitHub token must have `administration: write` permission.
#     The default GITHUB_TOKEN in Actions is sufficient when the workflow
#     runs from the default branch by a repo admin.

on:
  workflow_dispatch:

permissions:
  administration: write
  contents: read

jobs:
  protect-main:
    name: Protect main branch
    runs-on: ubuntu-latest
    steps:
      - name: Apply branch protection rules
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const branch = 'main';

            // Status check contexts must match exactly what GitHub shows
            // after a successful CI run. Format: "<workflow name> / <job name>"
            const requiredChecks = [
              'PR Check / PR Guard',
              'CI / CI Complete',
            ];

            await github.rest.repos.updateBranchProtection({
              owner,
              repo,
              branch,
              required_status_checks: {
                strict: true,           // branch must be up-to-date before merge
                contexts: requiredChecks,
              },
              enforce_admins: true,     // even admins must follow the rules
              required_pull_request_reviews: {
                dismiss_stale_reviews:           true,
                require_code_owner_reviews:      false,
                required_approving_review_count: 1,
              },
              restrictions: null,       // no push restrictions beyond the PR requirement
              allow_force_pushes: false,
              allow_deletions: false,
            });

            console.log(`Branch protection applied to ${owner}/${repo}:${branch}`);
            console.log('Required checks:', requiredChecks);
