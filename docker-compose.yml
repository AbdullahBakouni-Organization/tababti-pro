          'CMD-SHELL',
          'node -e "require(\"net\").connect(3003,\"localhost\",()=>process.exit(0)).on(\"error\",()=>process.exit(1))"',
        ]
      interval: 15s
      timeout: 50s
      retries: 5
      start_period: 90s

  # ============================================
  # Kafka (KRaft mode — no Zookeeper)
  # ============================================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: tababti-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      # FIX: must include CONTROLLER in the protocol map
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-obLD1OX2eJCrze8SNFZ4kA}
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - tababti-network
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    healthcheck:
      # FIX: correct port — listeners are on 29092, not 9092
      test:
        [
          'CMD',
          'kafka-broker-api-versions',
          '--bootstrap-server',
          'localhost:29092',
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ============================================
  # MinIO
  # ============================================
  minio:
    image: minio/minio:latest
    container_name: tababti-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    # FIX: bind to localhost only — MinIO should NOT be exposed to the internet
    ports:
      - '127.0.0.1:${MINIO_API_PORT:-9000}:9000'
      - '127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio_data:/data
    networks:
      - tababti-network
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3

  # ============================================
  # MinIO Init — runs once to create buckets
  # ============================================
  minio-init:
    image: minio/mc:latest
    container_name: tababti-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb myminio/${MINIO_BUCKET_DOCTORS:-tababti-doctors} --ignore-existing;
      /usr/bin/mc mb myminio/${MINIO_BUCKET_PATIENTS:-tababti-patients} --ignore-existing;
      /usr/bin/mc mb myminio/${MINIO_BUCKET_GENERAL:-tababti-general} --ignore-existing;
      /usr/bin/mc anonymous set download myminio/${MINIO_BUCKET_DOCTORS:-tababti-doctors};
      /usr/bin/mc anonymous set download myminio/${MINIO_BUCKET_PATIENTS:-tababti-patients};
      /usr/bin/mc anonymous set download myminio/${MINIO_BUCKET_GENERAL:-tababti-general};
      echo 'Buckets ready.';
      exit 0;
      "
    networks:
      - tababti-network

  # ============================================
  # Kafka UI — protected with login
  # ============================================
  kafka-ui:
    image: provectuslabs/kafka-ui
    container_name: tababti-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: tababti
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      # FIX: require login — never expose kafka-ui without auth in production
      AUTH_TYPE: LOGIN_FORM
      SPRING_SECURITY_USER_NAME: ${KAFKA_UI_USER:-admin}
      SPRING_SECURITY_USER_PASSWORD: ${KAFKA_UI_PASSWORD}
    # FIX: bind to localhost only
    ports:
      - '127.0.0.1:${KAFKA_UI_PORT:-8090}:8080'
    networks:
      - tababti-network
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: tababti-kafka-init
