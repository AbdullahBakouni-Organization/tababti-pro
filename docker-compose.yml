# ============================================
# Production Docker Compose — Tababti Platform
# Hostinger + Coolify/Dokploy Deployment
# ============================================

networks:
  tababti-network:
    driver: bridge

volumes:
  kafka_data:
  minio_data:
  redis_data:

services:
  # ============================================
  # NGINX — Primary Load Balancer (External)
  # ============================================
  nginx-primary:
    image: nginx:alpine
    container_name: tababti-nginx-primary
    restart: unless-stopped
    # Port 80/443 are owned by Dokploy's Traefik.
    # Traefik routes external traffic to this container via Docker network.
    # Configure your domain in Dokploy → Domains → port 80.
    expose:
      - '80'
    volumes:
      - ./nginx/nginx-primary.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - tababti-network
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    healthcheck:
      test: ['CMD', 'nginx', '-t']
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Redis
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: tababti-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    networks:
      - tababti-network
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # API Gateway
  # ============================================
  api-gateway:
    image: ${DOCKER_USERNAME:-abdullahbakouni}/tababti-api-gateway:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/api-gateway.Dockerfile
    container_name: tababti-api-gateway
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000

      # Database
      MONGO_URI: ${MONGO_URI}
      MONGO_DB: ${MONGO_DB}

      # FIX: hardcode redis hostname to match container name on network
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      # Kafka
      KAFKA_BROKER: kafka:29092

      # MinIO
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_DOCTORS: ${MINIO_BUCKET_DOCTORS}
      MINIO_BUCKET_PATIENTS: ${MINIO_BUCKET_PATIENTS}
      MINIO_BUCKET_GENERAL: ${MINIO_BUCKET_GENERAL}
      MINIO_PUBLIC_URL_DEV: ${MINIO_PUBLIC_URL_DEV}
      # JWT
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}

      # Direct routing to services — no intermediate nginx-internal
      HOME_SERVICE_URL: http://home-service:3001/api/v1
      SOCIAL_SERVICE_URL: http://social-service:3002/api/v1
      NOTIFICATION_SERVICE_URL: http://notification-service:3006/api/v1
      BOOKING_SERVICE_URL: http://booking-service:3003/api/v1
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    depends_on:
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      home-service-1:
        condition: service_healthy
      home-service-2:
        condition: service_healthy
      social-service-1:
        condition: service_healthy
      social-service-2:
        condition: service_healthy
      booking-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    networks:
      - tababti-network
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "require(\"net\").connect(3000,\"localhost\",()=>process.exit(0)).on(\"error\",()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Home Service — Instance 1
  # ============================================
  home-service-1:
    image: ${DOCKER_USERNAME:-abdullahbakouni}/tababti-home-service:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/home-service.Dockerfile
    container_name: tababti-home-service-1
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      INSTANCE_ID: home-1
      MONGO_URI: ${MONGO_URI}
      MONGO_DB: ${MONGO_DB}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      KAFKA_BROKER: kafka:29092
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      KAFKAJS_NO_PARTITIONER_WARNING: '1'
      MINIO_BUCKET_DOCTORS: ${MINIO_BUCKET_DOCTORS}
      MINIO_BUCKET_PATIENTS: ${MINIO_BUCKET_PATIENTS}
      MINIO_BUCKET_GENERAL: ${MINIO_BUCKET_GENERAL}
      MINIO_PUBLIC_URL_DEV: ${MINIO_PUBLIC_URL_DEV}
      FLASK_API_URL: ${FLASK_API_URL}
      OPENROUTE_API_KEY: ${OPENROUTE_API_KEY}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
    depends_on:
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      tababti-network:
        aliases:
          - home-service
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "require(\"net\").connect(3001,\"localhost\",()=>process.exit(0)).on(\"error\",()=>process.exit(1))"',
